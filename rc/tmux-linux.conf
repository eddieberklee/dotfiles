# Linux/VPS-only tmux tail — sourced by rc/tmux.conf (shared) on non-Darwin.

# Unlike the Mac (deterministic restore script), continuum auto-restore is
# fine here: the server reboots rarely and no competing tmux client exists at
# boot. Restores layout/dirs after a VPS reboot; rerun agents with --resume.
set -g @continuum-restore 'on'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# Recompute the window-tab wrap on startup and on config reload.
run-shell -b 'sh ~/dotfiles/rc/tmux-status-wrap'
