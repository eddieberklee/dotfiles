# Split panes with \ (left/right) and - (top/bottom), keeping the same working dir
unbind '%'
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"

# Enable mouse for pane resizing (click and drag borders)
set -g mouse on
# Ghostty supports OSC 8 hyperlinks; tell tmux so #{mouse_hyperlink} works.
set -g terminal-features[10] 'xterm-ghostty:hyperlinks'
# Make links clickable while tmux mouse mode stays on. For real OSC 8 links,
# open #{mouse_hyperlink}; otherwise parse the URL under #{mouse_x} from
# #{mouse_line}. Forward mouse events to apps that have enabled mouse tracking.
bind-key -T root MouseUp1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "run-shell -b 'TMUX_MOUSE_HYPERLINK=#{q:mouse_hyperlink} TMUX_MOUSE_LINE=#{q:mouse_line} TMUX_MOUSE_X=#{mouse_x} /Users/edlee/dotfiles/rc/tmux-open-url-at-mouse'"

# Switch panes with Prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Swap (move) panes with Prefix + H/J/K/L
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Do not tint pane interiors; leave terminal/app backgrounds alone.
# Unset these so reloading clears the previous green pane backgrounds.
set -gu window-style
set -gu window-active-style

# Pane borders/title strips use dark green for inactive panes and light red
# for the active pane, without changing shell/editor backgrounds.
set -g pane-active-border-style fg=black,bg=colour203
set -g pane-border-style fg=colour194,bg=colour22
set -g pane-border-lines heavy
# Color the section of the border between panes so the active pane's edges
# also visually 'connect' to its title strip.
set -g pane-border-indicators colour
# Pane border labels: always on
# Format: <index> || <title> || <directory> || <git branch>
set -g pane-border-status top
set -g pane-border-format " #{?@claude_state,#{@claude_state} ,}#[bold]#{pane_index} || #{?@claude_prompt,#{@claude_prompt},#{pane_title}} || #{s|$HOME|~|:pane_current_path} || #(git -C '#{pane_current_path}' branch --show-current 2>/dev/null)#[nobold] "

# Reload this config with Prefix + r (refresh-client forces panes to repaint
# after style changes)
bind r source-file ~/.tmux.conf \; refresh-client \; display "Reloaded ~/.tmux.conf"

# Rename pane with Prefix + t (replaces the default clock binding)
unbind t
bind t command-prompt -p "Pane title:" 'select-pane -T "%%"'
# Reset pane title back to default with Prefix + >
bind > run-shell 'tmux select-pane -T "#{host_short}"'

# Status bar styling — Tokyo Night
set -g status-style fg=colour251,bg=colour234
set -g status-justify left
set -g status-left "     "

# Inactive windows: subdued
set -g window-status-format " #I: #W "
set -g window-status-style fg=colour248,bg=colour234

# Active window: Tokyo Night blue
set -g window-status-current-format " #I: #W "
set -g window-status-current-style fg=colour235,bg=colour111,bold

# Bell monitoring: highlight window tab when a bell is received (TN orange)
setw -g monitor-bell on
set -g window-status-bell-style fg=colour235,bg=colour215,bold

# --- Claude Code / rendering stability ---
# Reduce escape sequence delay (prevents rendering lag)
set -sg escape-time 0
# Enable focus events (helps apps detect pane focus properly)
set -g focus-events on
# Don't let programs rename windows (prevents Claude overwriting names)
set -g allow-rename off
# Prevent activity in other panes from triggering alerts/focus changes
setw -g monitor-activity off
set -g visual-activity off

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Continuum settings ---
# Auto-save every 15 minutes
set -g @continuum-save-interval '15'
# Automatically restore last saved session when tmux server starts
set -g @continuum-restore 'on'

# --- Resurrect settings ---
# Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
