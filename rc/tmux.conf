# Shared tmux config — deployed as ~/.tmux.conf (symlink) on BOTH the Mac and
# the VPS (hermes-hostinger). Machine-specific bits (continuum boot/restore
# mechanics) live in rc/tmux-darwin.conf / rc/tmux-linux.conf, sourced at the
# bottom. Requires ~/dotfiles checked out at $HOME on every machine.

# Split panes with \ (left/right) and - (top/bottom), keeping the same working dir
unbind '%'
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"

# Enable mouse for pane resizing (click and drag borders)
set -g mouse on
# Ghostty supports OSC 8 hyperlinks; tell tmux so #{mouse_hyperlink} works.
set -g terminal-features[10] 'xterm-ghostty:hyperlinks'
# Make links clickable while tmux mouse mode stays on. For real OSC 8 links,
# open #{mouse_hyperlink}; otherwise parse the URL under #{mouse_x} from
# #{mouse_line}. Forward mouse events to apps that have enabled mouse tracking.
bind-key -T root MouseUp1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "run-shell -b 'TMUX_MOUSE_HYPERLINK=#{q:mouse_hyperlink} TMUX_MOUSE_LINE=#{q:mouse_line} TMUX_MOUSE_X=#{mouse_x} ~/dotfiles/rc/tmux-open-url-at-mouse'"

# Switch panes with Prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Swap (move) panes with Prefix + H/J/K/L
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Toggle to the last (previously-focused) window with Prefix + Tab. The default
# last-window key (Prefix + l) is taken by select-pane -R above.
bind Tab last-window

# Reorder the selected window left/right using the 30014/30015 sequences.
# -d keeps focus on the moved window.
unbind -n C-S-h
unbind -n C-S-l
unbind -n C-M-h
unbind -n C-M-l
unbind -n S-Left
unbind -n S-Right
set -s user-keys[2] "\e[5;30014~"
set -s user-keys[3] "\e[5;30015~"
bind -n User2 swap-window -d -t :-1
bind -n User3 swap-window -d -t :+1

# Dedicated focus-only sequences for iTerm2. These intentionally use fresh
# user keys so they cannot overlap with the existing reorder shortcuts.
set -s user-keys[4] "\e[5;30016~"
set -s user-keys[5] "\e[5;30017~"
bind -n User4 previous-window
bind -n User5 next-window

# iTerm2 maps Ctrl+Shift+Command+H/L to these private sequences. Register
# them as tmux user keys, then swap the current window with its left/right
# neighbour in the status bar. -d keeps the moved window selected.
set -s user-keys[0] "\e[5;30012~"
set -s user-keys[1] "\e[5;30013~"
bind -n User0 swap-window -d -t :-1
bind -n User1 swap-window -d -t :+1

# Renumber windows to close gaps when one is closed (1,3,4 -> 1,2,3).
set -g renumber-windows on

# Size windows to the most recently active client, not the smallest attached
# one — a phone client must not shrink the desktop view to phone size.
set -g window-size latest
setw -g aggressive-resize on

# Do not tint pane interiors; leave terminal/app backgrounds alone.
# Unset these so reloading clears the previous green pane backgrounds.
set -gu window-style
set -gu window-active-style

# Pane borders/title strips use dark green for inactive panes and light red
# for the active pane, without changing shell/editor backgrounds.
set -g pane-active-border-style fg=black,bg=colour208
set -g pane-border-style fg=colour225,bg=colour54
set -g pane-border-lines heavy
# Color the section of the border between panes so the active pane's edges
# also visually 'connect' to its title strip.
set -g pane-border-indicators colour
# Pane border labels: always on
# Format: <index> || <title> || <directory> || <git branch>
set -g pane-border-status top
# Title priority: a manual @pane_label (set with Prefix+T) wins over the
# agent-set prompt/title, which in turn falls back to the pane title. The
# manual label is its own user option because agent TUIs may overwrite
# pane_title every turn, so plain `select-pane -T` can't stick.
set -g pane-border-format " #{?@claude_state,#{@claude_state} ,}#[bold]#{pane_index} || #[bg=white,fg=black] #{?@pane_label,#{@pane_label},#{pane_title}} #[default]#[bold] || #{s|$HOME|~|:pane_current_path} || #(git -C '#{pane_current_path}' branch --show-current 2>/dev/null)#[nobold] "

# Reload this config with Prefix + r (refresh-client forces panes to repaint
# after style changes)
bind r source-file ~/.tmux.conf \; refresh-client \; display "Reloaded ~/.tmux.conf"

# Set a sticky pane label with Prefix + t. Writes @pane_label (not pane_title,
# which agent TUIs rewrite every turn) so the label survives. Submit an empty
# value to fall back to the auto title.
unbind t
bind t command-prompt -p "Pane label:" "set -p @pane_label '%%' ; refresh-client"
# Clear the manual label (back to the auto agent prompt/title) with Prefix + >
bind > set -pu @pane_label \; refresh-client

# Status bar styling — Tokyo Night
set -g status-style fg=colour251,bg=colour234
set -g status-justify left
set -g status-left "     "
# The selected pane title and clock duplicate the active window tab. Keep the
# visible right side empty while retaining Continuum's invisible autosave hook.
set -g status-right "#($HOME/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"

# Inactive windows: subdued. When a Claude or Codex pane needs input we tint
# the tab coral (🔔); the done state (✅) shows only the emoji, no tint. Either
# way the state emoji is appended. @claude_win_state is the historical shared
# option name; hooks for both agents roll it up from per-pane @claude_state.
set -g window-status-format "#{?#{==:#{@claude_win_state},🔔},#[fg=colour231]#[bg=colour203],} #I: #W #{?@claude_win_state,#{@claude_win_state} ,}"
set -g window-status-style fg=colour248,bg=colour234

# Active window: filled off-white tab with black text. Still appends the state
# emoji so a pane finishing in the current window shows too.
set -g window-status-current-format " #I: #W #{?@claude_win_state,#{@claude_win_state} ,}"
set -g window-status-current-style fg=colour16,bg=colour255,bold

# Wrap the window tabs onto extra status lines (up to 3) when they overflow
# the client width; back to one line when they fit. Per-session, recomputed by
# ~/dotfiles/rc/tmux-status-wrap whenever windows/widths change (also chained
# at index [1] onto the ack hooks below, and called from
# tmux-claude-window-rollup, since state emoji change tab widths).
set-hook -g window-linked 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'
set-hook -g window-unlinked 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'
set-hook -g after-rename-window 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'
set-hook -g client-resized 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'
set-hook -g client-attached 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'
set-hook -g client-session-changed 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'

# Acknowledge the agent indicator when you switch TO a window: clear every
# pane's @claude_state and the window's rolled-up @claude_win_state, so the tab
# icon clears no matter which pane was waiting (you needn't focus that pane).
# session-window-changed fires on any window switch (select/next/prev/last).
# #{window_id} is the newly-current window.
set-hook -g session-window-changed 'run-shell -b "sh ~/dotfiles/rc/tmux-claude-window-ack #{window_id}"'

# Focusing ANY pane treats the whole window as focused: clear every pane's
# @claude_state in that window (not just the one you landed on), so switching
# panes within a window clears sibling 🔔/✅ too. session-window-changed (above)
# covers window switches; this covers pane switches. #{window_id} = focused
# pane's window.
set-hook -g pane-focus-in 'run-shell -b "sh ~/dotfiles/rc/tmux-claude-window-ack #{window_id}"'

# Chain the tab-wrap recompute onto the ack hooks at index [1] — acks clear
# state emoji, which changes tab widths. These must stay BELOW the un-indexed
# set-hook lines above: set-hook without an index replaces the whole array.
set-hook -g 'session-window-changed[1]' 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'
set-hook -g 'pane-focus-in[1]' 'run-shell -b "sh ~/dotfiles/rc/tmux-status-wrap"'

# Bell monitoring: highlight window tab when a bell is received (TN orange)
setw -g monitor-bell on
set -g window-status-bell-style fg=colour235,bg=colour215,bold

# --- Claude Code / rendering stability ---
# Keep Meta/Option key sequences intact while avoiding perceptible input lag.
# iTerm sends Option+Backspace as Escape followed by Backspace.
set -sg escape-time 10
# Let terminal apps such as Codex request unambiguous modified-key reporting.
set -s extended-keys on
# Enable focus events (helps apps detect pane focus properly)
set -g focus-events on
# Don't let programs rename windows (prevents agent TUIs overwriting names)
set -g allow-rename off
# Prevent activity in other panes from triggering alerts/focus changes
setw -g monitor-activity off
set -g visual-activity off

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Continuum settings (shared) ---
# Auto-save every 15 minutes
set -g @continuum-save-interval '15'

# --- Resurrect settings (shared) ---
# Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Machine-specific tail: continuum restore/boot mechanics + TPM init.
# Each file ends by running TPM (+ post-TPM pins), so keep this LAST.
if-shell 'uname | grep -q Darwin' 'source-file ~/dotfiles/rc/tmux-darwin.conf' 'source-file ~/dotfiles/rc/tmux-linux.conf'
