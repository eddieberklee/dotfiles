# Mac-only tmux tail — sourced by rc/tmux.conf (shared) on Darwin. Ends by
# running TPM and re-pinning the resurrect crash-guard AFTER it, so keep the
# order in this file intact.

# Continuum's auto-restore is OFF: it silently skips restoring when TPM loads
# >10s after server start (slow post-boot machine) or when it sees any other
# tmux client/server process at startup — both bit us after the 2026-07-14 and
# 2026-07-15 reboots. Restore is handled deterministically by
# ~/.tmux/tmux-auto-restore.sh (run-shell at the bottom of this file).
set -g @continuum-restore 'off'
# Auto-start tmux at login (writes ~/Library/LaunchAgents/Tmux.Start.plist),
# opening iTerm2 with the restored sessions
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'

# Self-heal: continuum silently stops auto-saving if these ever get unset on a
# running server (its save loop no-ops when the path option is empty).
# resurrect.tmux sets the same values when TPM loads; this re-pins them on
# every source-file. Verify saves with: ls ~/.local/share/tmux/resurrect
set -g @resurrect-save-script-path '~/.tmux/resurrect-save-guard.sh'
set -g @resurrect-restore-script-path '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# After TPM: resurrect.tmux resets @resurrect-save-script-path to its default,
# so re-pin the crash-guard wrapper here (must stay below the tpm run line).
# The wrapper stops a near-empty post-reboot autosave from stealing `last`.
set -g @resurrect-save-script-path '~/.tmux/resurrect-save-guard.sh'

# Deterministic session restore on server start (replaces @continuum-restore,
# see the Continuum settings section above). Once per server, no-ops when the
# server already has real panes or the last save is near-empty.
# Log: ~/Library/Logs/tmux-auto-restore.log
run-shell -b 'bash ~/.tmux/tmux-auto-restore.sh'

# Recompute the window-tab wrap on startup and on config reload.
run-shell -b 'sh ~/dotfiles/rc/tmux-status-wrap'
